<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TWARVIS | Notes & Past Papers Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #1a1a2e;
        }

        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.15;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .tagline {
            color: #666;
            margin-top: 10px;
            font-size: 1rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            transition: transform 0.3s;
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .upload-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 28px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
            transition: all 0.3s;
        }

        .upload-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(102,126,234,0.6);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: rgba(255,255,255,0.95);
            padding: 10px;
            border-radius: 60px;
            backdrop-filter: blur(10px);
        }

        .tab {
            flex: 1;
            padding: 12px 20px;
            border: none;
            background: transparent;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s;
            color: #666;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .resource-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .resource-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .resource-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .resource-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .resource-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .resource-desc {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .resource-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #eee;
            font-size: 0.75rem;
            color: #999;
        }

        .download-link {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 14px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .download-link:hover {
            transform: scale(1.05);
        }

        .delete-link {
            color: #dc3545;
            font-size: 0.75rem;
            text-decoration: none;
        }

        .delete-link:hover {
            text-decoration: underline;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            position: relative;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .close {
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .close:hover {
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border 0.3s;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            transform: scale(1.02);
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 20px;
        }

        .empty-state i {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 15px;
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: white;
            margin-top: 30px;
        }

        @media (max-width: 768px) {
            .container { padding: 15px; }
            .logo { font-size: 2rem; }
            .upload-btn { padding: 12px 20px; font-size: 0.85rem; }
            .resource-grid { grid-template-columns: 1fr; }
            .modal-content { margin: 20% auto; padding: 20px; }
        }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>

    <div class="container">
        <div class="header">
            <h1 class="logo">⚡ TWARVIS</h1>
            <p class="tagline">Free Notes & Past Papers Library | Upload & Download Anytime</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalNotes">--</div>
                <div class="stat-label">Study Notes</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalPapers">--</div>
                <div class="stat-label">Past Papers</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalDownloads">--</div>
                <div class="stat-label">Total Downloads</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('notes')">📘 Notes</button>
            <button class="tab" onclick="switchTab('papers')">📄 Past Papers</button>
        </div>

        <div id="notesSection">
            <div class="resource-grid" id="notesGrid">
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <h3>Loading...</h3>
                </div>
            </div>
        </div>

        <div id="papersSection" style="display: none;">
            <div class="resource-grid" id="papersGrid">
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <h3>Loading...</h3>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>📚 TWARVIS - Free Educational Resource Hub | Upload & Share Knowledge</p>
        </div>
    </div>

    <button class="upload-btn" onclick="openUploadModal()">
        <i class="fas fa-cloud-upload-alt"></i> Upload Notes / Past Paper
    </button>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeUploadModal()">&times;</span>
            <h2 style="margin-bottom: 20px;"><i class="fas fa-upload"></i> Share Your Resources</h2>
            <form method="POST" action="/upload" enctype="multipart/form-data" onsubmit="return validateForm()">
                <div class="form-group">
                    <label>Resource Type</label>
                    <select name="type" required>
                        <option value="note">📘 Study Note</option>
                        <option value="pastpaper">📄 Past Paper</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" name="title" placeholder="e.g., Calculus II Final Exam Notes" required>
                </div>
                <div class="form-group">
                    <label>Description (optional)</label>
                    <textarea name="description" rows="3" placeholder="Brief description of this resource..."></textarea>
                </div>
                <div class="form-group">
                    <label>PDF File</label>
                    <input type="file" name="file" accept=".pdf,.doc,.docx" required>
                </div>
                <button type="submit" class="submit-btn"><i class="fas fa-cloud-upload-alt"></i> Publish Resource</button>
            </form>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
        const fontSize = 14;
        let drops = [];

        function initMatrix() {
            const columns = canvas.width / fontSize;
            drops = [];
            for (let i = 0; i < columns; i++) {
                drops[i] = Math.random() * -100;
            }
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0f0';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = chars.charAt(Math.floor(Math.random() * chars.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        initMatrix();
        setInterval(drawMatrix, 40);
        window.addEventListener('resize', initMatrix);

        function switchTab(tab) {
            const notesSection = document.getElementById('notesSection');
            const papersSection = document.getElementById('papersSection');
            const tabs = document.querySelectorAll('.tab');
            
            if (tab === 'notes') {
                notesSection.style.display = 'block';
                papersSection.style.display = 'none';
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                notesSection.style.display = 'none';
                papersSection.style.display = 'block';
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }
        }

        function openUploadModal() {
            document.getElementById('uploadModal').style.display = 'block';
        }

        function closeUploadModal() {
            document.getElementById('uploadModal').style.display = 'none';
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('uploadModal')) {
                closeUploadModal();
            }
        }

        function validateForm() {
            const title = document.querySelector('input[name="title"]').value;
            const file = document.querySelector('input[name="file"]').value;
            if (!title || !file) {
                alert('Please fill in title and select a file');
                return false;
            }
            return true;
        }

        async function loadStats() {
            try {
                const response = await fetch('/statistics');
                const data = await response.json();
                document.getElementById('totalNotes').textContent = data.notes;
                document.getElementById('totalPapers').textContent = data.pastpapers;
                document.getElementById('totalDownloads').textContent = data.downloads;
            } catch(e) {
                console.error('Stats error:', e);
            }
        }

        async function loadContent() {
            try {
                const response = await fetch('/statistics');
                const data = await response.json();
                document.getElementById('totalNotes').textContent = data.notes;
                document.getElementById('totalPapers').textContent = data.pastpapers;
                document.getElementById('totalDownloads').textContent = data.downloads;
                
                // You would need an API endpoint to get all notes/papers
                // For now, reload the page to get content
                window.location.reload();
            } catch(e) {
                console.error('Load error:', e);
            }
        }

        loadStats();
        setInterval(loadStats, 15000);
    </script>
</body>
</html>
